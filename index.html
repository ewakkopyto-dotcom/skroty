<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sekcje</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, "Helvetica Neue", Arial, sans-serif;
    color: #1a1a1a;
  }

  .sk-wrap {
    padding: 1.5rem 0.5rem 1.25rem;
    max-width: 560px;
    margin: 0 auto;
  }
  .sk-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 1rem;
    padding: 0 4px;
  }
  .sk-title {
    font-size: 18px;
    font-weight: 600;
    color: #1a1a1a;
    letter-spacing: -0.01em;
  }
  .sk-sub {
    font-size: 12px;
    color: #999;
  }

  .sk-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .sk-tile {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    border: 0.5px solid rgba(0, 0, 0, 0.1);
    border-radius: 12px;
    background: transparent;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s ease, transform 0.1s ease, background 0.15s ease;
  }
  .sk-tile:hover {
    border-color: rgba(0, 0, 0, 0.25);
    background: rgba(0, 0, 0, 0.02);
    transform: translateY(-1px);
  }
  .sk-tile:active { transform: translateY(0); }

  .sk-icon {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 10px;
    background: rgba(0, 0, 0, 0.04);
    flex-shrink: 0;
    color: #555;
  }
  .sk-text { flex: 1; min-width: 0; }
  .sk-name {
    font-size: 15px;
    font-weight: 500;
    color: #1a1a1a;
    line-height: 1.2;
    display: block;
  }
  .sk-meta {
    font-size: 12px;
    color: #999;
    margin-top: 3px;
    display: block;
  }
  .sk-arrow {
    color: #bbb;
    flex-shrink: 0;
    transition: transform 0.15s ease, color 0.15s ease;
  }
  .sk-tile:hover .sk-arrow {
    color: #555;
    transform: translateX(2px);
  }
</style>
</head>
<body>

<div class="sk-wrap">

  <div class="sk-header">
    <h2 class="sk-title">Sekcje</h2>
    <span class="sk-sub">mapa strony</span>
  </div>

  <div class="sk-list">

    <a class="sk-tile" target="_top"
       href="https://www.notion.so/tomekwilk/Keep-it-simple-keep-it-organized-2-0-35b2e147ffbd80dcb6abe2a8fc41f425#3632e147ffbd806bafe0d1a8a70668b4">
      <span class="sk-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 4v1M12 19v1M4 12h1M19 12h1M6.3 6.3l0.7 0.7M17 17l0.7 0.7M6.3 17.7l0.7-0.7M17 7l0.7-0.7"/>
        </svg>
      </span>
      <span class="sk-text">
        <span class="sk-name">Aktywne sprawy</span>
        <span class="sk-meta">Ten tydzień</span>
      </span>
      <svg class="sk-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 6l6 6-6 6"/>
      </svg>
    </a>

    <a class="sk-tile" target="_top"
       href="https://www.notion.so/tomekwilk/Keep-it-simple-keep-it-organized-2-0-35b2e147ffbd80dcb6abe2a8fc41f425#3632e147ffbd8060939dfc81ed4008d4">
      <span class="sk-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="5" width="18" height="16" rx="2"/>
          <path d="M3 9h18M8 3v4M16 3v4"/>
        </svg>
      </span>
      <span class="sk-text">
        <span class="sk-name">Kalendarz</span>
        <span class="sk-meta">Widok miesiąca</span>
      </span>
      <svg class="sk-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 6l6 6-6 6"/>
      </svg>
    </a>

    <a class="sk-tile" target="_top"
       href="https://www.notion.so/tomekwilk/Keep-it-simple-keep-it-organized-2-0-35b2e147ffbd80dcb6abe2a8fc41f425#3632e147ffbd80e2882cf4b9eabcd906">
      <span class="sk-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <rect x="5" y="4" width="14" height="17" rx="2"/>
          <path d="M9 4v3h6V4"/>
          <path d="M9 12h6M9 16h4"/>
        </svg>
      </span>
      <span class="sk-text">
        <span class="sk-name">Zlecenia</span>
        <span class="sk-meta">PRD · Pro-formy · Zadania</span>
      </span>
      <svg class="sk-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 6l6 6-6 6"/>
      </svg>
    </a>

  </div>

</div>

</body>
</html>
